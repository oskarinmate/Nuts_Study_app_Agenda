name: nuts_study_app
description: "A new Flutter project."
version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  table_calendar: ^3.0.9
  flutter_local_notifications: ^17.2.1
  timezone: ^0.9.2
  intl: ^0.20.2
  sqflite: ^2.3.0
  path: ^1.9.0
  provider: ^6.1.2
  cupertino_icons: ^1.0.8
  flutter_timezone: ^5.0.1
  flutter_localizations:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # 1. AGREGAMOS LA HERRAMIENTA DE ICONOS AQUÍ
  flutter_launcher_icons: ^0.13.1

# 2. CONFIGURACIÓN DEL ICONO (AL FINAL, FUERA DE LA SECCIÓN FLUTTER)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  # 3. REGISTRAMOS LA CARPETA ASSETS
  assets:
    - assets/